name: Weekly DB Cleanup

# 언제 실행할지 설정
on:
  schedule:
    # 매주 일요일 자정(UTC 기준, 한국시간 일요일 오전 9시)에 실행
    - cron: '0 0 * * 0'
  workflow_dispatch: # 수동으로 버튼을 눌러서 실행할 수 있게 해주는 옵션

# 깃허브 봇이 파일에 쓰기(수정) 권한을 가질 수 있도록 허용
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 내 저장소의 파일들을 가상 컴퓨터로 가져옴
      - name: 저장소 가져오기
        uses: actions/checkout@v3

      # 2. 파이썬 설치
      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. 필요한 라이브러리(pandas) 설치
      - name: 라이브러리 설치
        run: |
          pip install pandas

      # 4. 우리가 만든 파이썬 파일 실행!
      - name: DB 정리 스크립트 실행
        run: |
          python clean_db.py

      # 5. 수정된 결과물을 깃허브에 다시 덮어쓰기 (업데이트)
      - name: 변경된 파일 깃허브에 자동 저장
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add daangn_with_coords.csv
          # 변경사항이 있을 때만 저장(commit) 하도록 처리
          git commit -m "Auto-update: 중복 제거 및 DB 정리" || echo "No changes to commit"
          git push
